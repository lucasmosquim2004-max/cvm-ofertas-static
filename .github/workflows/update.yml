name: Update Dashboard

on:
  schedule:
    - cron: '0 9 * * *'  # 6h horário de Brasília (UTC-3)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r etl/requirements.txt

      - name: Run ETL (download + load CVM data)
        run: |
          cd etl
          python ofertas_monitor.py

      - name: Load ANBIMA data (if file committed)
        run: |
          if ls etl/data/anbima/*.xlsx 2>/dev/null | head -1 | grep -q .; then
            cd etl
            python ofertas_monitor.py --load-anbima $(ls data/anbima/*.xlsx | head -1)
          else
            echo "Nenhum arquivo ANBIMA encontrado em etl/data/anbima/ — pulando"
          fi

      - name: Export JSONs
        run: |
          cd etl
          python export_json.py --out ../public/data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node deps
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
